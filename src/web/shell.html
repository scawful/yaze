<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="A modern, cross-platform ROM editor for The Legend of Zelda: A Link to the Past">

    <!-- COI Service Worker for SharedArrayBuffer support (must be first!) -->
    <script src="coi-serviceworker.js"></script>

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#1e1e1e">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="YAZE">
    <!-- Collaboration server URL -->
    <meta name="yaze-collab-server" content="wss://org.halext.org:8765">

    <!-- PWA Manifest -->
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" type="image/x-icon" href="./icons/favicon.ico">
    <link rel="apple-touch-icon" href="./icons/icon-192x192.png">

    <!-- Styles -->
    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="shortcuts_overlay.css">
    <link rel="stylesheet" href="touch_gestures.css">
    <link rel="stylesheet" href="collab_console.css">
    <link rel="stylesheet" href="terminal.css">
    <link rel="stylesheet" href="drop_zone.css">
    <link rel="stylesheet" href="loading_indicator.css">
    <link rel="stylesheet" href="error_handler.css">

    <title>YAZE Web</title>
  </head>
  <body>
    <div id="header">
      <div class="logo-area">
        <h1>YAZE</h1>
        <span class="version-tag">WASM</span>
      </div>
      <div id="controls">
        <button id="upload-btn" class="btn btn-primary" onclick="document.getElementById('rom-input').click()">
          Open ROM
        </button>
        <input type="file" id="rom-input" accept=".sfc,.smc">
        
        <button id="download-save-btn" class="btn" onclick="downloadSaves()">
          Saves
        </button>
        
        <button id="fullscreen-btn" class="btn" onclick="Module.requestFullscreen(false, false)">
          Fullscreen
        </button>
        
        <button id="terminal-btn" class="btn" onclick="toggleTerminal()">
          Terminal
        </button>
        
        <button id="collab-btn" class="btn" onclick="toggleCollabConsole()">
          Collab
        </button>
      </div>
    </div>

    <!-- Offline indicator -->
    <div id="offline-indicator">
      <span>⚡ Offline Mode</span>
    </div>

    <!-- Update notification -->
    <div id="update-notification">
      <span>New version available!</span>
      <button class="btn btn-primary" onclick="updateServiceWorker()">Update</button>
      <button class="btn" onclick="dismissUpdate()">Dismiss</button>
    </div>

    <!-- Touch mode indicator -->
    <div class="yaze-touch-indicator">Touch Mode</div>

    <div id="canvas-container">
      <div id="loading-overlay" style="display: none;"> <!-- Hidden by default, logic controls it -->
        <figure id="spinner"><div class="spinner"></div></figure>
        <div id="status">Downloading...</div>
        <progress value="0" max="100" id="progress" hidden=1></progress>
      </div>
      
      <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex=-1></canvas>

      <!-- Touch zoom controls -->
      <div class="yaze-zoom-controls">
        <button onclick="zoomIn()" title="Zoom In">+</button>
        <div class="yaze-zoom-level" id="zoom-level">100%</div>
        <button onclick="zoomOut()" title="Zoom Out">-</button>
        <button onclick="resetZoom()" title="Reset View">R</button>
      </div>
    </div>

    <div id="terminal-container" class="terminal-container terminal-collapsed">
      <div class="terminal-header" onclick="toggleTerminal()">
        <div class="terminal-window-controls" onclick="event.stopPropagation()">
          <button class="terminal-window-btn close" onclick="hideTerminal()" title="Close"></button>
          <button class="terminal-window-btn minimize" onclick="toggleTerminal()" title="Minimize"></button>
          <button class="terminal-window-btn maximize" onclick="maximizeTerminal()" title="Maximize"></button>
        </div>
        <span class="terminal-title">z3ed — bash</span>
        <span class="terminal-toggle">▼</span>
      </div>
      <div class="terminal-body">
        <div class="terminal-resize-handle" id="terminal-resize-handle"></div>
        <div class="terminal-output" id="terminal-output"></div>
        <div class="terminal-input-line">
          <span class="terminal-prompt-symbol"></span>
          <input type="text" id="terminal-input" class="terminal-input" autocomplete="off" spellcheck="false" placeholder="type a command...">
          <button class="terminal-submit" onclick="submitTerminalCommand()">↵</button>
        </div>
      </div>
    </div>

    <!-- Scripts -->
    <script src="config.js"></script>
    <script src="app.js"></script>
    <script src="shortcuts_overlay.js"></script>
    <script src="touch_gestures.js"></script>
    <script src="collab_console.js"></script>
    <script src="terminal.js"></script>
    <script src="drop_zone.js"></script>
    <script src="loading_indicator.js"></script>
    <script src="error_handler.js"></script>
    {{{ SCRIPT }}}
  </body>
</html>
