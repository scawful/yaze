name: 'Setup Build Environment'
description: 'Setup build environment with dependencies and caching'
inputs:
  platform:
    description: 'Target platform (linux, macos, windows)'
    required: true
  preset:
    description: 'CMake preset to use'
    required: true
  cache-key:
    description: 'Cache key for dependencies'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Setup CPM cache
      if: inputs.cache-key != ''
      uses: actions/cache@v4
      with:
        path: ~/.cpm-cache
        key: cpm-${{ inputs.platform }}-${{ inputs.cache-key }}
        restore-keys: |
          cpm-${{ inputs.platform }}-

    - name: Reclaim disk space (Linux) - BEFORE package install
      if: inputs.platform == 'linux'
      shell: bash
      run: |
        set -euxo pipefail

        echo "=========================================="
        echo "DISK SPACE BEFORE CLEANUP"
        echo "=========================================="
        df -h
        echo ""

        reclaim() {
          if [ -d "$1" ]; then
            echo "Removing $1..."
            sudo rm -rf "$1"
          fi
        }

        echo "Removing large pre-installed directories..."
        reclaim /usr/share/dotnet
        reclaim /usr/local/lib/android
        reclaim /opt/ghc
        reclaim /usr/local/share/boost
        reclaim /usr/local/.ghcup
        reclaim "${AGENT_TOOLSDIRECTORY:-/opt/hostedtoolcache}"

        echo "Removing language runtime caches..."
        sudo rm -rf /home/runner/.cache/pip /home/runner/.cache/npm /home/runner/.cache/yarn || true
        sudo rm -rf /home/runner/.cargo || true
        sudo rm -rf /home/runner/.rustup || true

        echo "Pruning Docker images and containers..."
        sudo docker system prune -af --volumes || true

        echo "Cleaning apt cache..."
        sudo apt-get clean
        sudo rm -rf /var/lib/apt/lists/* || true

        echo ""
        echo "=========================================="
        echo "DISK SPACE AFTER CLEANUP"
        echo "=========================================="
        df -h
        echo ""

    - name: Setup build environment (Linux)
      if: inputs.platform == 'linux'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y $(tr '\n' ' ' < .github/workflows/scripts/linux-ci-packages.txt) gcc-12 g++-12
        sudo apt-get clean

    - name: Setup build environment (macOS)
      if: inputs.platform == 'macos'
      shell: bash
      run: |
        brew install ninja pkg-config ccache
        if ! command -v cmake &> /dev/null; then
          brew install cmake
        fi

    - name: Setup build environment (Windows)
      if: inputs.platform == 'windows'
      shell: pwsh
      run: |
        choco install --no-progress -y nasm ccache
        if ($env:ChocolateyInstall) {
          $profilePath = Join-Path $env:ChocolateyInstall "helpers\chocolateyProfile.psm1"
          if (Test-Path $profilePath) {
            Import-Module $profilePath
            refreshenv
          }
        }
        # Ensure Git can handle long paths and cached directories when cloning gRPC dependencies
        git config --global core.longpaths true
        git config --global --add safe.directory '*'

    - name: Setup sccache
      continue-on-error: true  # Skip hard failure if GitHub temporarily returns HTML instead of the tarball
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ inputs.platform }}-${{ github.sha }}
        restore-keys: |
          ${{ inputs.platform }}-
        max-size: 500M
        variant: sccache

    - name: Configure compiler for Windows
      if: inputs.platform == 'windows'
      shell: pwsh
      run: |
        echo "CC=clang-cl" >> $env:GITHUB_ENV
        echo "CXX=clang-cl" >> $env:GITHUB_ENV
        echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache" >> $env:GITHUB_ENV
        echo "CMAKE_C_COMPILER_LAUNCHER=sccache" >> $env:GITHUB_ENV
