name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.0.0)'
        required: true
        type: string

env:
  VERSION: ${{ github.event.inputs.version || github.ref_name }}

permissions:
  contents: write

jobs:
  release-preflight:
    name: "Release Preflight"
    runs-on: ubuntu-22.04
    outputs:
      version_tag: ${{ steps.version.outputs.version_tag }}
      version_plain: ${{ steps.version.outputs.version_plain }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve and validate release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          input_version="${{ env.VERSION }}"
          if [[ -z "${input_version}" ]]; then
            echo "VERSION input is empty"
            exit 1
          fi

          version_plain="${input_version#v}"
          version_tag="v${version_plain}"

          if [[ ! "${version_plain}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9]+)*$ ]]; then
            echo "Invalid release version: ${input_version}"
            exit 1
          fi

          repo_version="$(tr -d '[:space:]' < VERSION)"
          if [[ "${repo_version}" != "${version_plain}" ]]; then
            echo "VERSION file (${repo_version}) does not match release version (${version_plain})"
            exit 1
          fi

          if [[ "${{ github.event_name }}" == "push" ]]; then
            ref_tag="${{ github.ref_name }}"
            if [[ "${ref_tag}" != "${version_tag}" ]]; then
              echo "Tag/ref (${ref_tag}) does not match resolved release tag (${version_tag})"
              exit 1
            fi
          fi

          echo "version_tag=${version_tag}" >> "$GITHUB_OUTPUT"
          echo "version_plain=${version_plain}" >> "$GITHUB_OUTPUT"
          echo "Resolved release: ${version_tag}"

      - name: Verify release version/changelog protocol
        run: bash scripts/dev/release-version-check.sh

      - name: Verify release notes section exists
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/release/extract-release-notes.sh \
            "${{ steps.version.outputs.version_tag }}" \
            docs/public/release-notes.md >/tmp/release-notes-extract.md
          test -s /tmp/release-notes-extract.md

  build:
    name: "Build Release - ${{ matrix.name }}"
    needs: [release-preflight]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Ubuntu 22.04"
            os: ubuntu-22.04
            platform: linux
            preset: release
          - name: "macOS 14"
            os: macos-14
            platform: macos
            preset: release
          - name: "Windows 2022"
            os: windows-2022
            platform: windows
            preset: release

    steps:
      - name: Free up disk space (Linux)
        if: matrix.platform == 'linux'
        run: |
          echo "=== Disk space before cleanup ==="
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          echo "=== Disk space after cleanup ==="
          df -h

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Compute dependency lock hash
        id: deps-hash
        shell: bash
        run: |
          python_cmd="$(command -v python3 || command -v python || true)"
          if [ -z "$python_cmd" ]; then
            echo "hash=none" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          hash=$("$python_cmd" - <<'PY'
          import hashlib
          import pathlib
          path = pathlib.Path("cmake/dependencies.lock")
          if path.is_file():
              print(hashlib.sha256(path.read_bytes()).hexdigest())
          else:
              print("none")
          PY
          )
          echo "hash=$hash" >> "$GITHUB_OUTPUT"

      - name: Setup build environment
        uses: ./.github/actions/setup-build
        with:
          platform: ${{ matrix.platform }}
          preset: ${{ matrix.preset }}
          cache-key: ${{ steps.deps-hash.outputs.hash }}

      - name: Build project
        uses: ./.github/actions/build-project
        with:
          platform: ${{ matrix.platform }}
          preset: ${{ matrix.preset }}
          build-type: Release

      - name: Patch cmake_install.cmake (Unix)
        if: matrix.platform == 'linux' || matrix.platform == 'macos'
        shell: bash
        run: |
          cd "build/presets/${{ matrix.preset }}"
          # Create a Python script to patch cmake_install.cmake
          python3 << 'EOF'
          import re
          with open('cmake_install.cmake', 'r') as f:
              content = f.read()
          # Wrap include() statements with if(EXISTS)
          pattern = r'(\s*)include\("(.*)/_deps/([^"]+)/cmake_install\.cmake"\)'
          replacement = r'\1if(EXISTS "\2/_deps/\3/cmake_install.cmake")\n\1  include("\2/_deps/\3/cmake_install.cmake")\n\1endif()'
          content = re.sub(pattern, replacement, content)
          with open('cmake_install.cmake', 'w') as f:
              f.write(content)
          print("Patched cmake_install.cmake to handle missing dependency install scripts")
          EOF

      - name: Clean old packages before CPack
        shell: bash
        env:
          BUILD_DIR: build/presets/${{ matrix.preset }}
        run: |
          echo "Cleaning old package files to ensure fresh generation"
          rm -rf "$BUILD_DIR/packages" "$BUILD_DIR/_CPack_Packages"
          rm -f "$BUILD_DIR"/*.deb "$BUILD_DIR"/*.tar.gz "$BUILD_DIR"/*.dmg "$BUILD_DIR"/*.zip "$BUILD_DIR"/*.exe
          mkdir -p "$BUILD_DIR/packages"

      - name: Package artifacts (Linux)
        if: matrix.platform == 'linux'
        run: |
          cd "build/presets/${{ matrix.preset }}"
          cpack -G DEB
          cpack -G TGZ
          echo "=== Contents of packages directory ==="
          ls -la packages/ 2>/dev/null || echo "No packages directory"
          echo "=== Package files created ==="
          shopt -s nullglob
          package_files=(packages/*.deb packages/*.tar.gz)
          if [[ ${#package_files[@]} -eq 0 ]]; then
            echo "No Linux package files found"
            exit 1
          fi
          ls -la "${package_files[@]}"
          shopt -u nullglob

      - name: Validate Linux artifacts
        if: matrix.platform == 'linux'
        shell: bash
        env:
          BUILD_DIR: build/presets/${{ matrix.preset }}
        run: |
          shopt -s nullglob
          deb_files=("$BUILD_DIR"/packages/*.deb)
          tgz_files=("$BUILD_DIR"/packages/*.tar.gz)
          if [[ ${#deb_files[@]} -eq 0 ]]; then
            echo "No DEB package produced in $BUILD_DIR/packages/"
            exit 1
          fi
          if [[ ${#tgz_files[@]} -eq 0 ]]; then
            echo "No TGZ package produced in $BUILD_DIR/packages/"
            exit 1
          fi
          python3 scripts/release/validate-archive.py "${deb_files[@]}" "${tgz_files[@]}"
          shopt -u nullglob

      - name: Package artifacts (macOS)
        if: matrix.platform == 'macos'
        shell: bash
        env:
          BUILD_DIR: build/presets/${{ matrix.preset }}
        run: |
          app_bundle="$(find "$BUILD_DIR/bin" -maxdepth 3 -type d -name yaze.app | head -n 1)"
          if [[ -n "${app_bundle}" ]]; then
            echo "Signing app bundle: ${app_bundle}"
            if [[ -n "${CODESIGN_IDENTITY:-}" ]]; then
              codesign --force --deep --options runtime --sign "${CODESIGN_IDENTITY}" "${app_bundle}"
            else
              codesign --force --deep --sign - "${app_bundle}"
            fi
            codesign --verify --deep --strict "${app_bundle}"
          else
            echo "No app bundle found under $BUILD_DIR/bin; skipping pre-package signing."
          fi
          cd "$BUILD_DIR"
          cpack -G DragNDrop
          echo "=== Contents of packages directory ==="
          ls -la packages/ 2>/dev/null || echo "No packages directory"
          echo "=== Package files created ==="
          ls -la packages/*.dmg 2>/dev/null || echo "No packages found"

      - name: Create bundle DMG (macOS)
        if: matrix.platform == 'macos'
        shell: bash
        env:
          BUILD_DIR: build/presets/${{ matrix.preset }}
        run: |
          chmod +x ./scripts/create-macos-bundle.sh
          ./scripts/create-macos-bundle.sh ${{ needs.release-preflight.outputs.version_plain }} yaze-${{ needs.release-preflight.outputs.version_tag }}-bundle || true
          if [ -f "yaze-${{ needs.release-preflight.outputs.version_tag }}-bundle.dmg" ]; then
            mkdir -p "$BUILD_DIR/packages"
            mv yaze-${{ needs.release-preflight.outputs.version_tag }}-bundle.dmg "$BUILD_DIR/packages/"
          fi

      - name: Validate macOS artifacts
        if: matrix.platform == 'macos'
        shell: bash
        env:
          BUILD_DIR: build/presets/${{ matrix.preset }}
        run: |
          chmod +x scripts/release/validate-dmg.sh
          echo "=== Checking for DMG files ==="
          ls -la "$BUILD_DIR/packages/" || echo "packages directory doesn't exist"

          shopt -s nullglob
          dmg_files=("$BUILD_DIR"/packages/yaze-*-Darwin*.dmg "$BUILD_DIR"/packages/yaze-*-macos*.dmg)
          if [[ ${#dmg_files[@]} -eq 0 ]]; then
            echo "No macOS DMG files found in $BUILD_DIR/packages/"
            exit 1
          fi

          for dmg in "${dmg_files[@]}"; do
            if [[ -f "$dmg" ]]; then
              scripts/release/validate-dmg.sh "$dmg"
            fi
          done

          bundle_dmgs=("$BUILD_DIR"/packages/yaze-*-bundle.dmg)
          if [[ -e "${bundle_dmgs[0]}" ]]; then
            for dmg in "${bundle_dmgs[@]}"; do
              if [[ -f "$dmg" ]]; then
                scripts/release/validate-dmg.sh "$dmg"
              fi
            done
          else
            echo "No bundle DMG found; skipping bundle validation."
          fi
          shopt -u nullglob

      - name: Patch cmake_install.cmake (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          cd "build/presets/${{ matrix.preset }}"
          # Wrap include() statements with if(EXISTS) to handle missing dependency install scripts
          $nl = [Environment]::NewLine
          $content = Get-Content cmake_install.cmake -Raw
          $content = $content -replace '(\s+)include\("(.*)/_deps/([^"]+)/cmake_install\.cmake"\)', "`$1if(EXISTS `"`$2/_deps/`$3/cmake_install.cmake`")$nl`$1  include(`"`$2/_deps/`$3/cmake_install.cmake`")$nl`$1endif()"
          Set-Content cmake_install.cmake $content
          Write-Host "Patched cmake_install.cmake to handle missing dependency install scripts"

      - name: Package artifacts (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          cd "build/presets/${{ matrix.preset }}"
          cpack
          Write-Host "=== Contents of packages directory ==="
          Get-ChildItem packages -ErrorAction SilentlyContinue
          Write-Host "=== Package files created ==="
          Get-ChildItem packages/*.exe, packages/*.zip -ErrorAction SilentlyContinue

      - name: Validate Windows artifacts
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $pkgDir = "build/presets/${{ matrix.preset }}/packages"
          $zips = Get-ChildItem -Path $pkgDir -Filter "*.zip" -ErrorAction SilentlyContinue
          $exes = Get-ChildItem -Path $pkgDir -Filter "*.exe" -ErrorAction SilentlyContinue
          if ($zips.Count -eq 0) {
            Write-Host "No ZIP files found in $pkgDir/"
            Write-Host "Contents of $pkgDir/:"
            Get-ChildItem -Path $pkgDir -ErrorAction SilentlyContinue | Format-Table
            exit 1
          }
          if ($exes.Count -eq 0) {
            Write-Host "No EXE files found in $pkgDir/"
            Write-Host "Contents of $pkgDir/:"
            Get-ChildItem -Path $pkgDir -ErrorAction SilentlyContinue | Format-Table
            exit 1
          }
          foreach ($zip in $zips) {
            Write-Host "Validating: $($zip.FullName)"
            python scripts/release/validate-archive.py $zip.FullName
          }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yaze-${{ matrix.platform }}-${{ needs.release-preflight.outputs.version_tag }}
          path: |
            build/presets/${{ matrix.preset }}/packages/*.deb
            build/presets/${{ matrix.preset }}/packages/*.tar.gz
            build/presets/${{ matrix.preset }}/packages/*.dmg
            build/presets/${{ matrix.preset }}/packages/*.exe
            build/presets/${{ matrix.preset }}/packages/*.zip
          if-no-files-found: warn
          retention-days: 30

  test:
    name: "Test Release - ${{ matrix.name }}"
    needs: [release-preflight, build]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Ubuntu 22.04"
            os: ubuntu-22.04
            platform: linux
            preset: release
          - name: "macOS 14"
            os: macos-14
            platform: macos
            preset: release
          - name: "Windows 2022"
            os: windows-2022
            platform: windows
            preset: release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Compute dependency lock hash
        id: deps-hash
        shell: bash
        run: |
          python_cmd="$(command -v python3 || command -v python || true)"
          if [ -z "$python_cmd" ]; then
            echo "hash=none" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          hash=$("$python_cmd" - <<'PY'
          import hashlib
          import pathlib
          path = pathlib.Path("cmake/dependencies.lock")
          if path.is_file():
              print(hashlib.sha256(path.read_bytes()).hexdigest())
          else:
              print("none")
          PY
          )
          echo "hash=$hash" >> "$GITHUB_OUTPUT"

      - name: Setup build environment
        uses: ./.github/actions/setup-build
        with:
          platform: ${{ matrix.platform }}
          preset: ${{ matrix.preset }}
          cache-key: ${{ steps.deps-hash.outputs.hash }}

      - name: Build project
        uses: ./.github/actions/build-project
        with:
          platform: ${{ matrix.platform }}
          preset: ${{ matrix.preset }}
          build-type: Release

      - name: Run tests
        uses: ./.github/actions/run-tests
        with:
          test-type: stable
          preset: ${{ matrix.preset }}

  create-release:
    name: "Create Release"
    needs: [release-preflight, build, test]  # Tests are informational only in pre-1.0
    runs-on: ubuntu-22.04
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Display downloaded artifacts
        run: |
          echo "=== Downloaded artifacts structure ==="
          ls -laR artifacts/
          echo "=== Package files found ==="
          find artifacts -type f \( -name "*.zip" -o -name "*.exe" -o -name "*.deb" -o -name "*.tar.gz" -o -name "*.dmg" \)

      - name: Reorganize artifacts
        run: |
          # Flatten the artifact directory structure
          mkdir -p release-files
          find artifacts -type f \( -name "*.zip" -o -name "*.exe" -o -name "*.deb" -o -name "*.tar.gz" -o -name "*.dmg" \) -exec cp {} release-files/ \;
          echo "=== Files in release-files ==="
          ls -la release-files/

      - name: Generate release checksums
        run: |
          cd release-files
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Generate release body from docs
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/release/extract-release-notes.sh \
            "${{ needs.release-preflight.outputs.version_tag }}" \
            docs/public/release-notes.md > release-body.md
          echo "" >> release-body.md
          echo "## Checksums" >> release-body.md
          echo "" >> release-body.md
          echo "\`\`\`" >> release-body.md
          cat release-files/checksums.txt >> release-body.md
          echo "\`\`\`" >> release-body.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-preflight.outputs.version_tag }}
          name: "YAZE ${{ needs.release-preflight.outputs.version_tag }}"
          body_path: release-body.md
          files: |
            release-files/*
          draft: false
          prerelease: ${{ contains(needs.release-preflight.outputs.version_tag, 'alpha') || contains(needs.release-preflight.outputs.version_tag, 'beta') || contains(needs.release-preflight.outputs.version_tag, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
