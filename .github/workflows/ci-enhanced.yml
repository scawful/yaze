name: Enhanced CI/CD Pipeline

on:
  push:
    branches: [ master, develop, feat/* ]
    paths:
      - 'src/**'
      - 'test/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - '.github/workflows/**'
  pull_request:
    branches: [ master, develop ]
    paths:
      - 'src/**'
      - 'test/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
  workflow_dispatch:
    inputs:
      test_stage:
        description: 'Test stage to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - smoke
          - unit
          - integration
          - comprehensive
      enable_coverage:
        description: 'Enable code coverage'
        required: false
        default: false
        type: boolean

env:
  STAGE_1_TIMEOUT: 120  # 2 minutes
  STAGE_2_TIMEOUT: 300  # 5 minutes
  STAGE_3_TIMEOUT: 900  # 15 minutes
  CACHE_VERSION: v1

jobs:
  # =============================================================================
  # Stage 1: Smoke Tests (Critical Path) - 2 minutes max
  # =============================================================================
  stage1-smoke:
    name: "🚀 Stage 1: Smoke Tests"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 3
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-22.04, macos-14, windows-2022]

    outputs:
      smoke_passed: ${{ steps.smoke.outputs.passed }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # For test selection

      - name: Generate test binary hash
        id: test-hash
        shell: bash
        run: |
          TEST_HASH=$(find src test -name "*.cc" -o -name "*.h" | \
            xargs sha256sum 2>/dev/null || shasum -a 256 | \
            sha256sum | cut -d' ' -f1)
          echo "hash=${TEST_HASH:0:16}" >> $GITHUB_OUTPUT

      - name: Cache smoke test binaries
        id: cache-smoke
        uses: actions/cache@v4
        with:
          path: |
            build/bin/yaze_test_smoke*
            build/test_cache/
          key: smoke-${{ matrix.os }}-${{ steps.test-hash.outputs.hash }}
          restore-keys: |
            smoke-${{ matrix.os }}-

      - name: Build smoke tests (if not cached)
        if: steps.cache-smoke.outputs.cache-hit != 'true'
        uses: ./.github/actions/build-project
        with:
          platform: ${{ matrix.os }}
          preset: ci-minimal
          targets: yaze_test_smoke

      - name: Run smoke tests
        id: smoke
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "windows-2022" ]]; then
            ./build/bin/yaze_test_smoke.exe \
              --gtest_filter="*Critical*:*Smoke*" \
              --gtest_output=xml:smoke_${{ matrix.os }}.xml || true
          else
            ./build/bin/yaze_test_smoke \
              --gtest_filter="*Critical*:*Smoke*" \
              --gtest_output=xml:smoke_${{ matrix.os }}.xml || true
          fi

          # Check if passed
          if grep -q 'failures="0"' smoke_${{ matrix.os }}.xml; then
            echo "passed=true" >> $GITHUB_OUTPUT
          else
            echo "passed=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Upload smoke test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-results-${{ matrix.os }}
          path: smoke_*.xml
          retention-days: 1

  # =============================================================================
  # Stage 2: Unit Tests (Parallel Sharded) - 5 minutes max
  # =============================================================================
  stage2-unit:
    name: "⚡ Stage 2: Unit Tests (Shard ${{ matrix.shard }})"
    needs: stage1-smoke
    runs-on: ${{ matrix.os }}
    timeout-minutes: 8
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14, windows-2022]
        shard: [1, 2, 3, 4]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine changed files
        id: changes
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="origin/${{ github.base_ref }}"
          else
            BASE_REF="HEAD~1"
          fi

          git diff --name-only $BASE_REF > changed_files.txt
          echo "Changed files:"
          cat changed_files.txt

      - name: Setup build environment
        uses: ./.github/actions/setup-build
        with:
          platform: ${{ matrix.os }}
          preset: ci-${{ matrix.os }}
          cache-key: ${{ hashFiles('cmake/dependencies.lock') }}-${{ env.CACHE_VERSION }}

      - name: Build unit tests
        uses: ./.github/actions/build-project
        with:
          platform: ${{ matrix.os }}
          preset: ci-${{ matrix.os }}
          targets: yaze_test_stable

      - name: Select tests for shard
        id: select
        shell: bash
        run: |
          # Use smart test selector
          if [ -f "scripts/smart_test_selector.py" ]; then
            python3 scripts/smart_test_selector.py \
              --changed-files changed_files.txt \
              --shard ${{ matrix.shard }} \
              --total-shards 4 \
              --output filter > test_filter.txt
          else
            # Fallback to simple sharding
            echo "*Unit*" > test_filter.txt
          fi

          echo "Test filter for shard ${{ matrix.shard }}:"
          cat test_filter.txt
          echo "filter=$(cat test_filter.txt)" >> $GITHUB_OUTPUT

      - name: Run unit test shard
        shell: bash
        run: |
          TEST_FILTER="${{ steps.select.outputs.filter }}"
          TEST_BINARY="./build/bin/yaze_test_stable"

          if [[ "${{ matrix.os }}" == "windows-2022" ]]; then
            TEST_BINARY="${TEST_BINARY}.exe"
          fi

          # Run with parallel gtest execution
          GTEST_TOTAL_SHARDS=4 \
          GTEST_SHARD_INDEX=${{ matrix.shard }} \
          $TEST_BINARY \
            --gtest_filter="$TEST_FILTER" \
            --gtest_output=xml:unit_${{ matrix.os }}_${{ matrix.shard }}.xml \
            --gtest_brief=1 || true

      - name: Parse test times
        if: always()
        shell: bash
        run: |
          # Extract test times for optimization
          if [ -f "unit_${{ matrix.os }}_${{ matrix.shard }}.xml" ]; then
            python3 - <<'EOF'
          import xml.etree.ElementTree as ET
          import json

          tree = ET.parse("unit_${{ matrix.os }}_${{ matrix.shard }}.xml")
          root = tree.getroot()

          test_times = {}
          for testsuite in root.findall('.//testsuite'):
              for testcase in testsuite.findall('testcase'):
                  name = f"{testsuite.get('name')}.{testcase.get('name')}"
                  time = float(testcase.get('time', 0))
                  test_times[name] = time

          with open("test_times_${{ matrix.shard }}.json", 'w') as f:
              json.dump(test_times, f)
          EOF
          fi

      - name: Upload shard results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-shard-${{ matrix.os }}-${{ matrix.shard }}
          path: |
            unit_*.xml
            test_times_*.json
          retention-days: 3

  # =============================================================================
  # Stage 3: Comprehensive Tests (Integration + E2E)
  # =============================================================================
  stage3-comprehensive:
    name: "🔍 Stage 3: ${{ matrix.test-type }} Tests"
    needs: stage2-unit
    if: github.event.inputs.test_stage == 'all' || github.event.inputs.test_stage == 'comprehensive'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            test-type: integration
            preset: ci-linux
          - os: macos-14
            test-type: gui
            preset: ci-macos
          - os: windows-2022
            test-type: e2e
            preset: ci-windows

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup full environment
        uses: ./.github/actions/setup-build
        with:
          platform: ${{ matrix.os }}
          preset: ${{ matrix.preset }}
          full-deps: true

      - name: Cache test data
        uses: actions/cache@v4
        with:
          path: |
            test_data/
            ~/.yaze_test_data/
          key: test-data-${{ hashFiles('test/data.manifest') }}
          restore-keys: |
            test-data-

      - name: Build comprehensive tests
        run: |
          cmake --preset ${{ matrix.preset }} \
            -DYAZE_BUILD_TESTS=ON \
            -DYAZE_ENABLE_ROM_TESTS=OFF \
            -DYAZE_TEST_E2E=${{ matrix.test-type == 'e2e' && 'ON' || 'OFF' }} \
            -DYAZE_TEST_GUI=${{ matrix.test-type == 'gui' && 'ON' || 'OFF' }}
          cmake --build build --target all --parallel

      - name: Run integration tests
        if: matrix.test-type == 'integration'
        run: |
          cd build
          ctest -L integration \
            --output-junit integration_results.xml \
            --parallel 2 \
            --timeout 300 || true

      - name: Run GUI tests (headless)
        if: matrix.test-type == 'gui'
        run: |
          ./build/bin/yaze_test_gui \
            --headless \
            --gtest_output=xml:gui_results.xml || true

      - name: Run E2E tests
        if: matrix.test-type == 'e2e'
        shell: bash
        run: |
          python3 scripts/run_e2e_tests.py \
            --parallel 2 \
            --output e2e_results.xml || true

      - name: Generate coverage report
        if: matrix.os == 'ubuntu-22.04' && github.event.inputs.enable_coverage == 'true'
        run: |
          lcov --capture --directory build \
            --output-file coverage.info \
            --ignore-errors source

          lcov --remove coverage.info \
            '*/test/*' '*/ext/*' '/usr/*' '*/build/*' \
            --output-file coverage_filtered.info

          lcov --summary coverage_filtered.info

      - name: Upload coverage
        if: matrix.os == 'ubuntu-22.04' && github.event.inputs.enable_coverage == 'true'
        uses: codecov/codecov-action@v3
        with:
          file: coverage_filtered.info
          flags: ${{ matrix.test-type }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: comprehensive-${{ matrix.test-type }}-${{ matrix.os }}
          path: |
            *_results.xml
            coverage*.info
          retention-days: 7

  # =============================================================================
  # Test Result Aggregation and Reporting
  # =============================================================================
  aggregate-results:
    name: "📊 Aggregate Test Results"
    needs: [stage1-smoke, stage2-unit, stage3-comprehensive]
    if: always()
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all_results/

      - name: Install dependencies
        run: |
          pip install pandas matplotlib junit-xml tabulate

      - name: Aggregate results
        run: |
          python3 scripts/aggregate_test_results.py \
            --input-dir all_results/ \
            --output results_summary.json \
            --generate-html report.html

      - name: Generate markdown summary
        run: |
          python3 - <<'EOF'
          import json
          import sys

          with open('results_summary.json') as f:
              results = json.load(f)

          # Generate markdown
          md = f"""## 🎯 Test Results Summary

          ### Overall Status: {'✅ PASSED' if results['overall_passed'] else '❌ FAILED'}

          | Stage | Status | Tests | Pass Rate | Duration |
          |-------|--------|-------|-----------|----------|
          | 🚀 Smoke | {results['stage1']['emoji']} | {results['stage1']['total']} | {results['stage1']['pass_rate']}% | {results['stage1']['duration']}s |
          | ⚡ Unit | {results['stage2']['emoji']} | {results['stage2']['total']} | {results['stage2']['pass_rate']}% | {results['stage2']['duration']}s |
          | 🔍 Integration | {results['stage3']['emoji']} | {results['stage3']['total']} | {results['stage3']['pass_rate']}% | {results['stage3']['duration']}s |

          **Total Tests**: {results['total_tests']} | **Passed**: {results['total_passed']} | **Failed**: {results['total_failed']}

          ### Performance Metrics
          - ⏱️ Total Duration: {results['total_duration']}s
          - 🚄 Tests/Second: {results['tests_per_second']:.1f}
          - 📈 Parallel Efficiency: {results['parallel_efficiency']}%

          [📄 View Full Report](https://github.com/${{github.repository}}/actions/runs/${{github.run_id}})
          """

          print(md)

          # Save to file
          with open('summary.md', 'w') as f:
              f.write(md)
          EOF

      - name: Post results to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('summary.md', 'utf8');

            // Find and update existing comment or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Test Results Summary')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: summary
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: summary
              });
            }

      - name: Upload final report
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ github.run_number }}
          path: |
            results_summary.json
            report.html
            summary.md
          retention-days: 30

      - name: Check test failures
        run: |
          python3 - <<'EOF'
          import json
          import sys

          with open('results_summary.json') as f:
              results = json.load(f)

          if not results['overall_passed']:
              print(f"❌ Tests failed! {results['total_failed']} failures out of {results['total_tests']} tests")
              sys.exit(1)
          else:
              print(f"✅ All {results['total_tests']} tests passed!")
          EOF

  # =============================================================================
  # Performance Monitoring (Optional)
  # =============================================================================
  performance-tracking:
    name: "📈 Performance Tracking"
    needs: aggregate-results
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Download results
        uses: actions/download-artifact@v4
        with:
          name: test-report-${{ github.run_number }}

      - name: Update metrics database
        env:
          METRICS_TOKEN: ${{ secrets.METRICS_TOKEN }}
        run: |
          # Send metrics to monitoring system
          curl -X POST https://metrics.yaze.io/api/test-runs \
            -H "Authorization: Bearer ${METRICS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d @results_summary.json || true

      - name: Check for performance regressions
        run: |
          python3 scripts/check_performance_regression.py \
            --current results_summary.json \
            --threshold 10 \
            --notify-slack ${{ secrets.SLACK_WEBHOOK }} || true